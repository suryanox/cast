name: tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: install poetry
        run: pip install poetry

      - name: install dependencies
        run: poetry install --with dev

      - name: run tests
        run: poetry run pytest tests/ -v --tb=short
